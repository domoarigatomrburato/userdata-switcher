<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Top layer: blue -->
    <linearGradient id="topFace" x1="128" y1="32" x2="128" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Middle layer: teal -->
    <linearGradient id="midFace" x1="128" y1="82" x2="128" y2="174" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <!-- Bottom layer: violet -->
    <linearGradient id="botFace" x1="128" y1="132" x2="128" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4b5fd"/>
